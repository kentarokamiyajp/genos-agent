# --------------------------------------------------------------------- #
# P. Tool-selection quality (multi-tool + negative-tool)               #
# --------------------------------------------------------------------- #
# Feed the continuous tool-selection metric (runner._tool_selection_metrics
# → tool_recall / tool_excl_ok). The metric reads ONLY the metric-only
# gold fields below — `expected_tools` and `forbidden_tools` — which the
# assertion checker ignores, so they NEVER gate pass/fail. That's
# deliberate: multi-tool gold is path-sensitive (the model has valid
# alternate routes), so a hard `tools_used_contains: [A, B]` would
# flaky-fail the all-must-pass gate. The continuous metric instead
# degrades gracefully (one-tool shortcut → tool_recall 0.5).
#
# The one exception is the write-tool negative (P4): a read query
# triggering an approval-gated write is near-zero risk and most valuable
# as a hard gate, so it uses the gating `tools_used_excludes`.
#
# NOTE: these were authored against the fixture WITHOUT running the
# behavior suite (needs LLM creds). Validate the metric-only gold with
# `python manage.py agent_eval --case <id>` and inspect the printed
# `metrics:` line before promoting any `expected_tools`/`forbidden_tools`
# to a gating `tools_used_contains`/`tools_used_excludes`.

# P1–P3: multi-tool — two tools that return NON-OVERLAPPING data, so the
# question genuinely needs both (no single tool subsumes the other, and
# search returns neither rollup). Gold is metric-only.

- id: multitool_throughput_and_closers
  # throughput = created/closed COUNTS over time; top_closers = ranked
  # WHO leaderboard. Disjoint: neither tool returns the other's half.
  query: "How many tasks did we close in the last week, and who closed the most?"
  fixture: true
  expect:
    tool_calls_at_least: 1
    answer_contains_any: ["close", "closed", "task"]
    no_errors: true
    expected_tools: ["get_task_throughput_stats", "get_top_task_closers"]

- id: multitool_project_health_and_workload
  # project_summary = per-project status counts; workload_distribution =
  # open tasks per ASSIGNEE. Disjoint (one is project-scoped status, the
  # other is per-person load).
  query: "How is the Q2 Roadmap project going, and who currently has the heaviest workload?"
  fixture: true
  expect:
    tool_calls_at_least: 1
    answer_contains_any: ["q2 roadmap", "open", "wip", "task"]
    no_errors: true
    expected_tools: ["get_project_summary", "get_workload_distribution"]

- id: multitool_team_and_status
  # team_members = names; team_task_summary = cross-project status
  # rollup. Disjoint (who vs how-many).
  query: "Who's on the team, and what's our overall task status across all projects?"
  fixture: true
  expect:
    tool_calls_at_least: 1
    answer_contains_any: ["alice", "bob", "carol", "dan"]
    no_errors: true
    expected_tools: ["get_team_members", "get_team_task_summary"]

# P4: negative — a READ query must not trigger approval-gated WRITE
# tools. Near-zero flake risk (no write intent), so this is a real
# gating assertion, not metric-only. Complements `list_overdue_tasks`
# by adding the no-write guardrail dimension.

- id: negtool_read_query_no_write
  query: "Which tasks are overdue right now?"
  fixture: true
  expect:
    tools_used_excludes: ["create_task", "update_task", "assign_task"]
    no_errors: true
    # Metric-only — the right read tool, fed to tool_recall (not gated:
    # "my overdue tasks" could legitimately route via get_my_schedule).
    expected_tools: ["list_tasks"]

# P5–P6: negative — the agent should answer from internal structured
# tools, NOT reach for the paid web search (or semantic search) on a
# question the workspace can answer directly. Lower-confidence than the
# write case, so metric-only (`forbidden_tools`) — promote to
# `tools_used_excludes` after a validating run.

- id: negtool_internal_count_no_web
  query: "How many open tasks does the team have right now?"
  fixture: true
  expect:
    tool_calls_at_least: 1
    no_errors: true
    forbidden_tools: ["search_web"]

- id: negtool_identity_no_search
  query: "What's my name and email address?"
  fixture: true
  expect:
    tool_calls_at_least: 1
    answer_contains_any: ["eval fixture", "@genos", "email"]
    no_errors: true
    expected_tools: ["get_current_user"]
    forbidden_tools: ["search_web", "search_knowledge_base"]

# ============================================================ #
# Q. Cross-session conversation memory (Q2.3 / C1)              #
# ============================================================ #
# Each case SEEDS a prior, ended conversation into the per-user
# `conversation` lane (setup.seed_conversation → OpenSearch), then asks
# a FRESH-session question whose answer lives ONLY in that past
# conversation (the fact is deliberately absent from the WRD/QRD
# workspace fixture). Passing requires the model to call
# `search_past_conversations` and ground its answer in the recalled Q&A
# — the cross-session recall the last-N-turns window can't provide.
# On a build WITHOUT the tool/lane these fail (the fact is unreachable),
# which is exactly the gap C1 closes.

- id: convmem_recall_staging_rotation
  fixture: true
  setup:
    seed_conversation:
      question: "What did we settle on for staging database password rotation?"
      answer: |
        We decided to rotate the staging database password every 14 days,
        automated by the rotate-staging-creds script that Priya owns. The
        current secret lives in 1Password under "staging-db-rot-2026".
  query: "What did we decide earlier about staging DB password rotation — how often, and who owns it?"
  expect:
    tools_used_contains: ["search_past_conversations"]
    answer_contains_any: ["14", "Priya", "rotate-staging-creds"]
    no_errors: true
    expected_tools: ["search_past_conversations"]

- id: convmem_recall_experiment_name
  fixture: true
  setup:
    seed_conversation:
      question: "What did we name the new onboarding cohort experiment, and who runs it?"
      answer: |
        We named the onboarding cohort experiment "Project Northwind" and
        agreed that Dana would run the A/B test for 3 weeks before we review.
  query: "Remind me what we called the onboarding cohort experiment and who's running it."
  expect:
    tools_used_contains: ["search_past_conversations"]
    answer_contains_any: ["Northwind", "Dana"]
    no_errors: true
    expected_tools: ["search_past_conversations"]

# ============================================================ #
# R. Relationship-graph queries (Q2.4 / GraphRAG foundation)   #
# ============================================================ #
# These exercise the seeded TaskDependency edges (demo_seeder:
# _seed_task_dependencies). They pass TODAY via the reactive
# `get_task_blockers` tool — validating the edges + the graph relation are
# reachable. GraphRAG (A1) would additionally make the relation
# retrieval-NATIVE (see the `graph_native_*` retrieval case); these behavior
# cases are the regression baseline for that work.

- id: graph_blockers_of_hero_build
  fixture: true
  query: "What's blocking the 'Build Hero + FeatureGrid' task? List the blockers."
  expect:
    tools_used_contains: ["get_task_blockers"]
    answer_contains_any: ["framer-motion", "Migrate marketing pages", "design system"]
    no_errors: true
    expected_tools: ["get_task_blockers"]

- id: graph_downstream_of_framer_spike
  fixture: true
  query: "What work is blocked by the framer-motion vs CSS animations spike?"
  expect:
    tools_used_contains: ["get_task_blockers"]
    answer_contains_any: ["Hero", "FeatureGrid"]
    no_errors: true
    expected_tools: ["get_task_blockers"]

# ============================================================ #
# S. Fact-level completeness (Q2.2 / plan-then-execute target) #
# ============================================================ #
# Harder than the `compound_*` cases above: each asserts only the SUBJECTS
# are addressed (stable gate), but the real measure is the LLM judge's
# `completeness` score (run with --judge) — does the answer actually carry
# each sub-question's FACT, or did the reactive loop drop one? This is the
# "passes != complete" distinction §4.2 calls out and the measurable target
# a planner (plan-then-execute) would have to beat.

- id: complete_four_part_wrd
  fixture: true
  query: >
    For the Website Redesign project, give me all four, each explicitly:
    (1) the status of the 'Build Hero + FeatureGrid' task,
    (2) the status of the 'Set up Plausible analytics' task,
    (3) what the team decided about framer-motion, and
    (4) what is blocking the accessibility audit from starting.
  expect:
    tool_calls_at_least: 1
    answer_contains_all: ["hero", "plausible", "framer", "accessibility"]
    has_citations: true
    no_errors: true

- id: complete_cross_project_five_facts
  fixture: true
  query: >
    Pull together five things for me, each stated explicitly: the status of the
    'Build Hero + FeatureGrid' task, the status of the 'Set up Plausible
    analytics' task, the status of the 'Synthesize 12 customer interviews' task,
    what blocks the 'Roadmap proposal', and what the framer-motion spike decided.
  expect:
    tool_calls_at_least: 1
    answer_contains_all: ["hero", "plausible", "interview", "roadmap", "framer"]
    has_citations: true
    no_errors: true
