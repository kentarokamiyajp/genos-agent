# --------------------------------------------------------------------- #
# K. Compound queries (Phase 3.3 measurement surface)                   #
# --------------------------------------------------------------------- #

- id: compound_perf_and_owner
  query: "What's the perf budget for the marketing site, and who owns the framer-motion spike?"
  fixture: true
  expect:
    # Compound query — needs both retrieval AND attribution. Agent
    # may use search + one or two fetch/list calls.
    tool_calls_at_least: 1
    has_citations: true
    no_errors: true

- id: compound_blockers_overview
  query: "What's blocking the homepage rebuild and what's blocking the roadmap proposal?"
  fixture: true
  expect:
    tool_calls_at_least: 1
    has_citations: true
    answer_contains_any: ["block", "synthesis", "featuregrid", "interview"]
    no_errors: true

# Phase 3.3 measurement surface — 6 harder compound cases to ground-truth
# the current pass rate on multi-part questions. The roadmap's "~50%
# answerable" baseline was a guess; these cases test it for real before
# deciding whether decomposition is the right intervention.

- id: compound_indep_perf_and_wip_count
  # Independent: perf budget (search) AND WIP count (list_tasks).
  # Both halves can be retrieved in parallel.
  query: "What's the perf budget for the marketing site, and how many tasks are currently in WIP status?"
  fixture: true
  expect:
    # The agent must use both a search + a structural list query.
    # Don't pin exact tools — `search_knowledge_base`+`list_tasks` is
    # one valid path; `search_knowledge_base`+`get_project_summary`
    # is another. We just require >=2 tool calls of distinct types.
    tool_calls_at_least: 2
    # Both halves of the answer must appear.
    answer_contains_all: ["perf", "wip"]
    has_citations: true
    no_errors: true

- id: compound_dep_responsive_nav_assignee
  # Dependent: identify the responsive-nav task first, THEN its
  # assignee. Parallel decomposition can't help here — sub-Q2 needs
  # sub-Q1's result. The existing multi-step loop is the right tool.
  query: "Who is assigned to the task about implementing responsive navigation?"
  fixture: true
  expect:
    tool_calls_at_least: 1
    answer_contains_any: ["bob", "martinez", "assigned"]
    no_errors: true

- id: compound_mixed_framer_chat_and_task
  # Mixed-source compound: the decision is recorded in a chat AND in
  # a note; the related task is the framer-motion spike. Agent needs
  # to surface both halves.
  query: "What did the team decide about framer-motion in chat, and which spike task is about it?"
  fixture: true
  expect:
    tool_calls_at_least: 1
    answer_contains_all: ["framer-motion", "spike"]
    has_citations: true
    no_errors: true

- id: compound_two_project_summaries
  # Two parallel summaries — classic decomposition target. Each
  # half is fully independent of the other.
  query: "Summarise what's blocking the Website Redesign project, and separately summarise what's happening in the Q2 Roadmap project."
  fixture: true
  expect:
    tool_calls_at_least: 1
    # Both project names must appear in the answer.
    answer_contains_all: ["website redesign", "q2 roadmap"]
    has_citations: true
    no_errors: true

- id: compound_three_part_facts
  # Three independent facts. The hardest parallel case — the agent
  # has to remember to cover all three parts in the final answer.
  query: "What's the perf budget for the marketing site, who's assigned to the FeatureGrid task, and what's the status of the Plausible analytics task?"
  fixture: true
  expect:
    tool_calls_at_least: 1
    # All three subjects must appear.
    answer_contains_all: ["perf", "featuregrid", "plausible"]
    has_citations: true
    no_errors: true

- id: compound_blocker_and_plan
  # Dependent compound: identify a blocker (a11y audit ↔ FeatureGrid),
  # then describe the plan to unblock. Multi-step retrieval territory.
  query: "What's blocking the accessibility audit from starting, and what needs to happen to unblock it?"
  fixture: true
  expect:
    tool_calls_at_least: 1
    answer_contains_any: ["featuregrid", "pr", "land"]
    has_citations: true
    no_errors: true

# --------------------------------------------------------------------- #
# O. Multi-turn memory (Phase 3.5 measurement surface)                  #
# --------------------------------------------------------------------- #
# A long conversation whose final turn references something only said
# in turns 1-2. With `SESSION_MAX_PRIOR_TURNS=3` (default), turn 6
# only sees turns 3, 4, 5 — losing Q2 Roadmap and Website Redesign
# from the model's context. Designed to FAIL baseline if the model
# doesn't carry the early-turn references forward, and PASS with
# `RAG_SESSION_ROLLING_SUMMARY=true` (which would summarise turns 1-3
# into a rolling context the model still sees in turn 6).

- id: multi_turn_recall_early_topic
  fixture: true
  # Turn 1 introduces a SPECIFIC project that is never re-mentioned in
  # turns 2-5 (so it cannot leak forward via the agent's own answer
  # text). Turn 6 references "the project I asked about at the start"
  # ambiguously — without memory of turn 1, the agent has to guess
  # which of the workspace's two projects the user meant, OR ask for
  # clarification (which fails the substantive-answer assertion). With
  # rolling summary, the summary preserves the turn-1 mention.
  turns:
    - query: "Tell me about the Q2 Roadmap project."
    - query: "What notes do I have in the workspace?"
    - query: "What's my workload distribution across statuses?"
    - query: "Show me the 'Spotlight tips' note in full."
    - query: "Who's on my team?"
    - query: "List the open tasks in the project I asked about at the start."
      expect:
        # The Q2 Roadmap title (from turn 1) must surface — proves the
        # agent carried that early context forward.
        answer_contains_all: ["q2 roadmap"]
        # Open Q2 Roadmap tasks include several QRD-N display ids; at
        # least one should appear in the response.
        answer_contains_any: ["qrd-", "discovery", "roadmap proposal", "synthesize"]
        answer_length_at_least: 80
        no_errors: true

# --------------------------------------------------------------------- #
# L. Citation discipline (locks in Phase 3.1 prompt rules)              #
# --------------------------------------------------------------------- #

- id: citation_no_fake_on_nonexistent_task
  # Task id that doesn't exist — fetch_task should error. Phase 3.1
  # prompt rule says: do not invent a citation for an entity that
  # wasn't retrieved. The answer should explain the failure plainly
  # WITHOUT a `[task:99999]` citation.
  query: "Show me task 99999."
  fixture: true
  expect:
    tools_used_contains: ["fetch_task"]
    tool_call_errors_contain: ["not found"]
    no_citations: true
    no_errors: true

- id: citation_lists_each_project
  # When the agent lists multiple projects (or fetches per-project
  # summary), Phase 3.1 prompt rule says: cite EACH item in the list.
  # Two projects exist → answer should cite at least 2 [project:N].
  query: "List all the projects I'm a member of."
  fixture: true
  expect:
    tools_used_contains: ["list_projects"]
    citations_count_at_least: 2
    no_errors: true

