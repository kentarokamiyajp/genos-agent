# B (expand). Specific-entity fetch                                     #
# --------------------------------------------------------------------- #

- id: fetch_personal_note_spotlight_tips
  query: "Read me the 'Spotlight tips' note in full."
  fixture: true
  expect:
    # search_knowledge_base + fetch_note OR a direct fetch_note path.
