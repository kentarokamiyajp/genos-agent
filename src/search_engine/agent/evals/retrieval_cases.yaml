# ============================================================ #
# J. Precision / noise (Q0.1 — §4.4)                            #
# ============================================================ #
# Recall (above) asks "did the gold surface?"; these ask "is the
# top-k free of noise?" — the opposite pull. They give the
# continuous `precision_at_k` / `labeled_precision` metric a real
# population: CLUSTER cases (>=2 relevant titles → the top-k
# should be packed with the cluster) and DISTRACTOR cases (a known
# near-neighbour that must NOT crowd in → labeled_precision). The
# gating assertion stays loose (any-one / a single clear negative)
# so the pass/fail is stable; the metric carries the real signal.

- id: precision_q2_discovery_cluster
  fixture: true
  query: "What discovery work is on the Q2 roadmap?"
  limit: 8
  expect:
    precision_k: 5
